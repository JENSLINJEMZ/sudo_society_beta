<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Challenges | Sudo Society</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ============================================================
           CSS VARIABLES (DARK MODE DEFAULT)
           ============================================================ */
        :root {
            --bg-primary: #0b0d0e;
            --bg-secondary: rgba(255, 255, 255, 0.03);
            --text-primary: #f0f5f3;
            --text-secondary: rgba(240, 245, 243, 0.70);
            --text-muted: rgba(240, 245, 243, 0.40);

            --accent: #6fcf97;
            --accent-dim: rgba(111, 207, 151, 0.12);
            --accent-glow: 0 0 40px rgba(111, 207, 151, 0.10);
            --accent-gradient: linear-gradient(135deg, #6fcf97, #27ae60);

            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.40);

            --orb-1: rgba(111, 207, 151, 0.12);
            --orb-2: rgba(46, 204, 113, 0.08);
            --orb-3: rgba(111, 207, 151, 0.06);

            --border-subtle: rgba(255, 255, 255, 0.04);
            --card-hover-border: rgba(111, 207, 151, 0.15);
            --card-hover-shadow: 0 12px 48px rgba(0, 0, 0, 0.50), 0 0 40px rgba(111, 207, 151, 0.06);

            --logo-bg: linear-gradient(135deg, #6fcf97, #27ae60);
            --logo-text-gradient: linear-gradient(135deg, #6fcf97, #27ae60);

            --toggle-bg: rgba(255, 255, 255, 0.08);
            --toggle-dot: #6fcf97;
            --toggle-border: rgba(255, 255, 255, 0.08);
            --toggle-icon: #f0f5f3;

            --scrollbar-track: #0b0d0e;
            --scrollbar-thumb: #6fcf97;

            --footer-border: rgba(255, 255, 255, 0.04);
            --error-color: #e74c3c;
            --success-color: #2ecc71;

            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Barlow Condensed', 'Inter', sans-serif;

            --header-bg: rgba(11, 13, 14, 0.70);

            --modal-bg: rgba(11, 13, 14, 0.92);
            --modal-card-bg: var(--bg-primary);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-focus: rgba(111, 207, 151, 0.25);

            --filter-btn-bg: rgba(255, 255, 255, 0.04);
            --filter-btn-border: rgba(255, 255, 255, 0.08);
            --filter-btn-hover: rgba(111, 207, 151, 0.12);
            --filter-btn-active: rgba(111, 207, 151, 0.20);
        }

        /* ============================================================
           LIGHT MODE
           ============================================================ */
        body.light {
            --bg-primary: #f4f7f6;
            --bg-secondary: rgba(0, 0, 0, 0.02);
            --text-primary: #141817;
            --text-secondary: rgba(20, 24, 23, 0.72);
            --text-muted: rgba(20, 24, 23, 0.45);

            --accent: #c0392b;
            --accent-dim: rgba(192, 57, 43, 0.08);
            --accent-glow: 0 0 40px rgba(192, 57, 43, 0.06);
            --accent-gradient: linear-gradient(135deg, #c0392b, #a93226);

            --glass-bg: rgba(255, 255, 255, 0.60);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);

            --orb-1: rgba(192, 57, 43, 0.06);
            --orb-2: rgba(180, 40, 30, 0.04);
            --orb-3: rgba(192, 57, 43, 0.03);

            --border-subtle: rgba(0, 0, 0, 0.04);
            --card-hover-border: rgba(192, 57, 43, 0.15);
            --card-hover-shadow: 0 12px 48px rgba(0, 0, 0, 0.06), 0 0 30px rgba(192, 57, 43, 0.04);

            --logo-bg: linear-gradient(135deg, #c0392b, #a93226);
            --logo-text-gradient: linear-gradient(135deg, #c0392b, #a93226);

            --toggle-bg: rgba(0, 0, 0, 0.06);
            --toggle-dot: #c0392b;
            --toggle-border: rgba(0, 0, 0, 0.06);
            --toggle-icon: #141817;

            --scrollbar-track: #f4f7f6;
            --scrollbar-thumb: #c0392b;

            --footer-border: rgba(0, 0, 0, 0.04);

            --header-bg: rgba(244, 247, 246, 0.80);

            --modal-bg: rgba(244, 247, 246, 0.92);
            --modal-card-bg: #ffffff;
            --input-bg: rgba(0, 0, 0, 0.02);
            --input-border: rgba(0, 0, 0, 0.08);
            --input-focus: rgba(192, 57, 43, 0.15);

            --filter-btn-bg: rgba(0, 0, 0, 0.02);
            --filter-btn-border: rgba(0, 0, 0, 0.06);
            --filter-btn-hover: rgba(192, 57, 43, 0.08);
            --filter-btn-active: rgba(192, 57, 43, 0.15);
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        /* ============================================================
           AMBIENT BACKGROUND ORBS
           ============================================================ */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 18s ease-in-out infinite alternate;
            transition: background 0.8s ease, opacity 0.8s ease;
        }

        .ambient .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -15%;
            left: -5%;
            background: radial-gradient(circle, var(--orb-1), transparent 70%);
            animation-duration: 22s;
        }

        .ambient .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -10%;
            right: -5%;
            background: radial-gradient(circle, var(--orb-2), transparent 70%);
            animation-duration: 26s;
            animation-delay: -6s;
        }

        .ambient .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, var(--orb-3), transparent 70%);
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -30px) scale(1.05);
            }
            66% {
                transform: translate(-20px, 40px) scale(0.95);
            }
            100% {
                transform: translate(20px, -20px) scale(1.02);
            }
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           GLASS CARD
           ============================================================ */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 20px;
            transition: background 0.5s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 14px 0;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.5s ease, border-color 0.4s ease;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .logo:hover {
            opacity: 0.85;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--logo-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 0 30px rgba(111, 207, 151, 0.15);
            transition: background 0.5s ease, box-shadow 0.4s ease;
            font-family: var(--font-display);
        }

        body.light .logo-icon {
            color: #fff;
            box-shadow: 0 0 30px rgba(192, 57, 43, 0.12);
        }

        .logo-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: var(--logo-text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: background 0.5s ease;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ============================================================
           FILTER BUTTONS
           ============================================================ */
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid var(--filter-btn-border);
            background: var(--filter-btn-bg);
            color: var(--text-secondary);
            font-family: var(--font-primary);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover {
            background: var(--filter-btn-hover);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .filter-btn.active {
            background: var(--filter-btn-active);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(111, 207, 151, 0.08);
        }

        body.light .filter-btn.active {
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.08);
        }

        /* ============================================================
           THEME TOGGLE
           ============================================================ */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 10px 4px 4px;
            border-radius: 40px;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            transition: background 0.4s ease, border-color 0.4s ease;
            user-select: none;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            opacity: 0.85;
        }

        .toggle-track {
            position: relative;
            width: 40px;
            height: 22px;
            border-radius: 40px;
            background: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            transition: background 0.4s ease, border-color 0.4s ease;
            flex-shrink: 0;
        }

        .toggle-dot {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--toggle-dot);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        body.light .toggle-dot {
            transform: translateX(18px);
        }

        .toggle-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            transition: color 0.4s ease;
        }

        .toggle-icon {
            font-size: 0.85rem;
            color: var(--toggle-icon);
            transition: color 0.4s ease;
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        main {
            flex: 1;
            padding: 32px 0 40px;
        }

        .challenges-section {
            padding: 28px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            transition: background 0.5s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .challenges-section::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-dim), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: background 0.5s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            background: var(--logo-text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: background 0.5s ease;
        }

        .challenge-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: color 0.4s ease;
        }

        /* ============================================================
           CHALLENGES GRID
           ============================================================ */
        .challenges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .challenge-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 20px 18px;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, background 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }

        .challenge-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-dim), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: background 0.5s ease;
        }

        .challenge-card:hover {
            transform: translateY(-4px);
            border-color: var(--card-hover-border);
            box-shadow: var(--card-hover-shadow);
        }

        .challenge-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(111, 207, 151, 0.12);
        }

        body.light .challenge-card.active {
            box-shadow: 0 0 30px rgba(192, 57, 43, 0.10);
        }

        .challenge-card.dimmed {
            opacity: 0.4;
            filter: grayscale(0.5);
        }

        .challenge-card.solved {
            border-color: var(--success-color);
            background: rgba(46, 204, 113, 0.04);
        }

        .challenge-card .category {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 3px 12px;
            border-radius: 20px;
            background: var(--accent-dim);
            color: var(--accent);
            margin-bottom: 10px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .challenge-card .title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            transition: color 0.4s ease;
        }

        .challenge-card .points {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
            transition: color 0.4s ease;
        }

        .challenge-card .solves {
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: color 0.4s ease;
        }

        .challenge-card .solved-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--success-color);
            color: var(--bg-primary);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 20px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .challenge-card .card-arrow {
            position: absolute;
            bottom: 16px;
            right: 18px;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: transform 0.3s ease, color 0.4s ease;
        }

        .challenge-card:hover .card-arrow {
            transform: translateX(4px);
            color: var(--accent);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: color 0.4s ease;
        }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s ease;
        }

        .modal-overlay.visible {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--modal-card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px 36px;
            max-width: 680px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--glass-shadow);
            transform: translateY(-20px) scale(0.95);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease, background 0.5s ease, border-color 0.4s ease;
            position: relative;
        }

        .modal-overlay.visible .modal-content {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 4px 8px;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            padding-right: 32px;
            transition: color 0.4s ease;
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            transition: color 0.4s ease;
        }

        .modal-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-meta strong {
            color: var(--text-primary);
            font-weight: 600;
            transition: color 0.4s ease;
        }

        .modal-description {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 18px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            transition: background 0.4s ease, color 0.4s ease;
            border: 1px solid var(--border-subtle);
        }

        .modal-link-section {
            text-align: center;
            margin-bottom: 16px;
        }

        .modal-link-section a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 22px;
            border-radius: 40px;
            background: var(--accent-dim);
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s ease;
            border: 1px solid var(--glass-border);
        }

        .modal-link-section a:hover {
            background: var(--accent);
            color: var(--bg-primary);
            box-shadow: 0 4px 16px rgba(111, 207, 151, 0.20);
        }

        body.light .modal-link-section a:hover {
            box-shadow: 0 4px 16px rgba(192, 57, 43, 0.15);
        }

        .modal-flag-input {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .modal-flag-input input[type="text"] {
            flex: 1;
            min-width: 160px;
            padding: 10px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-primary);
            font-size: 0.95rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.4s ease, color 0.4s ease;
            outline: none;
        }

        .modal-flag-input input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        .modal-flag-input input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .modal-flag-input button {
            padding: 10px 28px;
            border: none;
            border-radius: 60px;
            background: var(--accent-gradient);
            color: var(--bg-primary);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            white-space: nowrap;
        }

        .modal-flag-input button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(111, 207, 151, 0.25);
        }

        body.light .modal-flag-input button:hover:not(:disabled) {
            box-shadow: 0 4px 20px rgba(192, 57, 43, 0.20);
        }

        .modal-flag-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .modal-message {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .modal-message.visible {
            display: block;
        }

        .modal-message.success {
            background: rgba(46, 204, 113, 0.12);
            border: 1px solid rgba(46, 204, 113, 0.20);
            color: var(--success-color);
        }

        .modal-message.error {
            background: rgba(231, 76, 60, 0.12);
            border: 1px solid rgba(231, 76, 60, 0.20);
            color: var(--error-color);
        }

        body.light .modal-message.success {
            background: rgba(46, 204, 113, 0.08);
            color: #1a8c4a;
        }

        body.light .modal-message.error {
            background: rgba(192, 57, 43, 0.08);
            color: #a93226;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        footer {
            padding: 24px 0;
            border-top: 1px solid var(--footer-border);
            text-align: center;
            transition: border-color 0.4s ease;
            margin-top: auto;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 0.75rem;
            opacity: 0.6;
            transition: color 0.4s ease;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .logo {
                justify-content: center;
            }
            .header-actions {
                justify-content: center;
                flex-wrap: wrap;
            }
            .filter-buttons {
                justify-content: center;
            }
            .theme-toggle {
                padding: 4px 8px 4px 4px;
            }
            .toggle-track {
                width: 36px;
                height: 20px;
            }
            .toggle-dot {
                width: 14px;
                height: 14px;
                top: 2px;
                left: 2px;
            }
            body.light .toggle-dot {
                transform: translateX(16px);
            }

            .challenges-section {
                padding: 20px 16px;
            }
            .section-title {
                font-size: 1.3rem;
            }
            .challenges-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 24px 20px;
            }
            .modal-title {
                font-size: 1.5rem;
            }
            .modal-flag-input {
                flex-direction: column;
            }
            .modal-flag-input input[type="text"] {
                width: 100%;
            }
            .modal-flag-input button {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }
            .challenges-section {
                padding: 16px 12px;
            }
            .section-title {
                font-size: 1.1rem;
            }
            .filter-btn {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
            .challenge-card {
                padding: 16px;
            }
            .challenge-card .title {
                font-size: 1rem;
            }
            .modal-content {
                padding: 16px;
            }
            .modal-title {
                font-size: 1.3rem;
            }
            .modal-description {
                font-size: 0.85rem;
                padding: 12px 14px;
            }
        }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.7s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .challenge-card {
            opacity: 0;
            transform: translateY(16px);
            animation: cardIn 0.5s ease forwards;
        }

        .challenge-card:nth-child(1) {
            animation-delay: 0.05s;
        }
        .challenge-card:nth-child(2) {
            animation-delay: 0.10s;
        }
        .challenge-card:nth-child(3) {
            animation-delay: 0.15s;
        }
        .challenge-card:nth-child(4) {
            animation-delay: 0.20s;
        }
        .challenge-card:nth-child(5) {
            animation-delay: 0.25s;
        }
        .challenge-card:nth-child(6) {
            animation-delay: 0.30s;
        }
        .challenge-card:nth-child(7) {
            animation-delay: 0.35s;
        }
        .challenge-card:nth-child(8) {
            animation-delay: 0.40s;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ===== AMBIENT ORBS ===== -->
    <div class="ambient" aria-hidden="true">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="container header-inner">
            <div class="logo" onclick="window.location.href='index.html'">
                <span class="logo-icon">§</span>
                <span class="logo-text">CTF Challenges</span>
            </div>
            <div class="header-actions">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="web">Web</button>
                    <button class="filter-btn" data-category="pwn">Pwn</button>
                    <button class="filter-btn" data-category="crypto">Crypto</button>
                    <button class="filter-btn" data-category="reversing">Rev</button>
                    <button class="filter-btn" data-category="misc">Misc</button>
                </div>
                <!-- Theme Toggle -->
                <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="Toggle theme">
                    <span class="toggle-icon" id="toggleIcon">🌙</span>
                    <div class="toggle-track">
                        <div class="toggle-dot"></div>
                    </div>
                    <span class="toggle-label" id="toggleLabel">Dark</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main>
        <div class="container">
            <section class="challenges-section fade-up">
                <div class="section-header">
                    <h1 class="section-title">Challenges</h1>
                    <span class="challenge-count" id="challengeCount">Loading...</span>
                </div>
                <div class="challenges-grid" id="challengesGrid">
                    <div class="empty-state">Loading challenges...</div>
                </div>
            </section>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="container">
            <p class="copyright">&copy; 2025 Sudo Society CTF. All rights reserved. Developed by JENSLIN</p>
        </div>
    </footer>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="challengeModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <h2 class="modal-title" id="modalTitle">Challenge Title</h2>
            <div class="modal-meta">
                <span>Category: <strong id="modalCategory">--</strong></span>
                <span>Points: <strong id="modalPoints">--</strong></span>
                <span>Solves: <strong id="modalSolves">--</strong></span>
            </div>
            <div class="modal-description" id="modalDescription">Loading description...</div>

            <div class="modal-link-section" id="modalLinkSection" style="display: none;">
                <a id="modalLink" href="#" target="_blank">
                    <i class="fas fa-external-link-alt"></i> Access Challenge
                </a>
            </div>

            <div class="modal-flag-input" id="flagInputSection">
                <input type="text" id="flagInput" placeholder="Enter your flag here...">
                <button id="submitFlagBtn">Submit Flag</button>
            </div>

            <div class="modal-message" id="modalMessage">
                <span id="messageText"></span>
            </div>
        </div>
    </div>

    <!-- ============================================================
    SCRIPT (ALL FUNCTIONALITY PRESERVED)
    ============================================================ -->
    <script>
        // --- Theme Toggle ---
        (function() {
            const toggle = document.getElementById('themeToggle');
            const toggleIcon = document.getElementById('toggleIcon');
            const toggleLabel = document.getElementById('toggleLabel');
            const body = document.body;

            const savedTheme = localStorage.getItem('sudo-theme');
            if (savedTheme === 'light') {
                body.classList.add('light');
                toggleIcon.textContent = '☀️';
                toggleLabel.textContent = 'Light';
            } else {
                toggleIcon.textContent = '🌙';
                toggleLabel.textContent = 'Dark';
            }

            function toggleTheme() {
                body.classList.toggle('light');
                const isLight = body.classList.contains('light');
                localStorage.setItem('sudo-theme', isLight ? 'light' : 'dark');
                toggleIcon.textContent = isLight ? '☀️' : '🌙';
                toggleLabel.textContent = isLight ? 'Light' : 'Dark';
            }

            toggle.addEventListener('click', toggleTheme);
            toggle.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleTheme();
                }
            });
        })();

        // --- Configuration ---
        const API_URL = 'https://sudosocietyctf.unaux.com/api/challenge.php';

        // --- DOM refs ---
        const challengesGrid = document.getElementById('challengesGrid');
        const challengeCount = document.getElementById('challengeCount');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const modal = document.getElementById('challengeModal');
        const closeModalBtn = document.getElementById('closeModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalCategory = document.getElementById('modalCategory');
        const modalPoints = document.getElementById('modalPoints');
        const modalSolves = document.getElementById('modalSolves');
        const modalDescription = document.getElementById('modalDescription');
        const modalLinkSection = document.getElementById('modalLinkSection');
        const modalLink = document.getElementById('modalLink');
        const flagInputSection = document.getElementById('flagInputSection');
        const flagInput = document.getElementById('flagInput');
        const submitFlagBtn = document.getElementById('submitFlagBtn');
        const modalMessage = document.getElementById('modalMessage');
        const messageText = document.getElementById('messageText');

        let allChallenges = [];
        let activeChallengeId = null;

        // --- API Helper ---
        async function callApi(action, method = 'GET', data = null) {
            console.log(`[API] ${action} | ${method}`);
            const url = new URL(API_URL);
            url.searchParams.append('action', action);
            const options = { method: method };
            if (method === 'POST' && data) {
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify(data);
            }
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    let errorDetails = `HTTP ${response.status}`;
                    try {
                        const errorBody = await response.json();
                        errorDetails = errorBody.error || errorBody.message || errorDetails;
                    } catch (_) {}
                    throw new Error(errorDetails);
                }
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.message || result.error || 'API call failed.');
                }
                console.log(`[API] ${action} success`);
                return result.data || result;
            } catch (error) {
                console.error(`[API] ${action} error:`, error);
                return null;
            }
        }

        // --- Fetch challenges ---
        async function fetchChallenges() {
            challengesGrid.innerHTML = '<div class="empty-state">Loading challenges...</div>';
            const data = await callApi('getChallenges');
            if (data && Array.isArray(data)) {
                allChallenges = data.map(ch => ({ ...ch, solved: ch.solved || false }));
                updateChallengeCount();
                applyFilter();
            } else {
                challengesGrid.innerHTML =
                    `<div class="empty-state" style="color: var(--error-color);">Failed to load challenges. Please try again.</div>`;
            }
        }

        // --- Update challenge count ---
        function updateChallengeCount() {
            const total = allChallenges.length;
            const solved = allChallenges.filter(c => c.solved).length;
            challengeCount.textContent = `${total} challenges · ${solved} solved`;
        }

        // --- Apply filter ---
        function applyFilter() {
            const activeBtn = document.querySelector('.filter-btn.active');
            const category = activeBtn ? activeBtn.dataset.category : 'all';
            const filtered = category === 'all' ? allChallenges : allChallenges.filter(c => c.category === category);
            renderChallenges(filtered);
        }

        // --- Render challenges ---
        function renderChallenges(challenges) {
            challengesGrid.innerHTML = '';
            if (challenges.length === 0) {
                challengesGrid.innerHTML = '<div class="empty-state">No challenges found for this category.</div>';
                return;
            }
            challenges.forEach((challenge, index) => {
                const card = document.createElement('div');
                card.className = 'challenge-card';
                if (challenge.solved) card.classList.add('solved');
                card.dataset.id = challenge.id;
                card.style.animationDelay = (index * 0.04) + 's';
                card.innerHTML = `
                    <span class="category">${challenge.category.toUpperCase()}</span>
                    <div class="title">${challenge.title}</div>
                    <div class="points">${challenge.points} POINTS</div>
                    <div class="solves">${challenge.solves || 0} SOLVES</div>
                    ${challenge.solved ? '<span class="solved-badge"><i class="fas fa-check"></i> Solved</span>' : ''}
                    <span class="card-arrow"><i class="fas fa-chevron-right"></i></span>
                `;
                challengesGrid.appendChild(card);
            });
        }

        // --- Show challenge details ---
        function showChallengeDetails(challenge) {
            modalTitle.textContent = challenge.title;
            modalCategory.textContent = challenge.category.toUpperCase();
            modalPoints.textContent = challenge.points;
            modalSolves.textContent = challenge.solves || 0;
            modalDescription.textContent = challenge.description || 'No detailed description available.';

            if (challenge.link && challenge.link.trim() !== '') {
                modalLink.href = challenge.link;
                modalLinkSection.style.display = 'block';
            } else {
                modalLinkSection.style.display = 'none';
            }

            flagInput.value = '';
            modalMessage.className = 'modal-message';
            modalMessage.style.display = 'none';

            if (challenge.solved) {
                flagInputSection.style.display = 'none';
                showModalMessage('You\'ve already solved this challenge! 🎉', 'success');
            } else {
                flagInputSection.style.display = 'flex';
            }

            modal.classList.add('visible');
        }

        // --- Hide modal ---
        function hideModal() {
            modal.classList.remove('visible');
            document.querySelectorAll('.challenge-card').forEach(c => c.classList.remove('active', 'dimmed'));
            activeChallengeId = null;
            modalMessage.className = 'modal-message';
            modalMessage.style.display = 'none';
        }

        // --- Show modal message ---
        function showModalMessage(text, type) {
            modalMessage.className = 'modal-message visible ' + type;
            messageText.textContent = text;
            modalMessage.style.display = 'block';
        }

        // --- Set active card ---
        function setActiveCard(id) {
            document.querySelectorAll('.challenge-card').forEach(card => {
                card.classList.toggle('active', parseInt(card.dataset.id) === id);
            });
        }

        // --- Event: Filter buttons ---
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                hideModal();
                applyFilter();
            });
        });

        // --- Event: Challenge card click ---
        challengesGrid.addEventListener('click', (e) => {
            const card = e.target.closest('.challenge-card');
            if (!card) return;
            const id = parseInt(card.dataset.id);
            const challenge = allChallenges.find(c => c.id === id);
            if (challenge) {
                setActiveCard(id);
                activeChallengeId = id;
                showChallengeDetails(challenge);
            }
        });

        // --- Event: Close modal ---
        closeModalBtn.addEventListener('click', hideModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) hideModal();
        });

        // --- Event: Escape key ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('visible')) hideModal();
        });

        // --- Event: Submit flag ---
        submitFlagBtn.addEventListener('click', async () => {
            const flag = flagInput.value.trim();
            if (!flag) {
                showModalMessage('Please enter a flag to submit.', 'error');
                return;
            }

            const challenge = allChallenges.find(c => c.id === activeChallengeId);
            if (!challenge) {
                showModalMessage('Challenge not found. Please try again.', 'error');
                return;
            }

            if (challenge.solved) {
                showModalMessage('You\'ve already solved this challenge! 🎉', 'success');
                flagInputSection.style.display = 'none';
                return;
            }

            submitFlagBtn.disabled = true;
            submitFlagBtn.textContent = 'Submitting...';

            const result = await callApi('submitFlag', 'POST', {
                challenge_id: activeChallengeId,
                flag: flag
            });

            if (result && result.success) {
                flagInputSection.style.display = 'none';
                showModalMessage(result.message + ' Well done, hacker! 🎉', 'success');
                // Refresh data
                await fetchChallenges();
                // Update solve count in modal
                const updated = allChallenges.find(c => c.id === activeChallengeId);
                if (updated) {
                    modalSolves.textContent = updated.solves || 0;
                    if (updated.solved) {
                        flagInputSection.style.display = 'none';
                    }
                }
                // Re-apply filter
                applyFilter();
            } else {
                flagInput.value = '';
                showModalMessage((result && result.message) || 'Incorrect flag. Keep trying!', 'error');
            }

            submitFlagBtn.disabled = false;
            submitFlagBtn.textContent = 'Submit Flag';
        });

        // --- Event: Enter key on flag input ---
        flagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitFlagBtn.click();
            }
        });

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            fetchChallenges();
        });
    </script>

</body>
</html>
