<body>
  <div class="scanline"></div>

  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo" onclick="window.location.href='index.html'">
          <img src="sudo_society.png" alt="Sudo Society Logo" class="logo-img">
          <span class="logo-text">Sudo Society</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="login-container">
      <div class="container">
        <div class="login-box">
          <h1 class="login-title">ACCESS TERMINAL</h1>

          <!-- Message box for login results -->
          <div class="message-box" id="loginMessageBox" style="display: none;">
            <p id="loginMessageText"></p>
          </div>

          <form id="loginForm"> <!-- Removed method="POST" action="login.php" to use JS fetch -->
            <div class="form-group">
              <label for="username">USERNAME OR EMAIL</label>
              <input type="text" id="username" name="identifier" class="form-control" placeholder="hacker1337" required>
              <div class="error-message">Please enter your username or email</div>
            </div>
            
            <div class="form-group">
              <label for="password">PASSWORD</label>
              <div class="password-container">
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                <span class="toggle-password" id="togglePassword">👁️</span>
              </div>
              <div class="error-message">Please enter your password</div>
            </div>
            
            <div class="login-options">
              <div class="remember-me">
                <input type="checkbox" id="remember" checked>
                <label for="remember">Remember me</label>
              </div>
              <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="submit-btn" id="loginBtn">LOGIN</button>
            
            <div class="social-login">
              <div class="social-title">OR CONTINUE WITH</div>
              <div class="social-buttons">
                <div class="social-btn" title="GitHub">Ⓖ</div>
                <div class="social-btn" title="Discord">𝔻</div>
                <div class="social-btn" title="Google">Ⓖ</div>
              </div>
            </div>
            
            <div class="register-link">
              Don't have an account? <a href="register.html">Register</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p class="copyright">© 2023 Sudo Society. All rights reserved. Developed by JENSLIN</p>
    </div>
  </footer>

  <script>
    // --- Configuration ---
    const API_URL = 'http://192.168.1.2/Sudo_society/api/login.php'; // <--- **VERIFY AND ADJUST THIS LINE!**

    // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const togglePassword = document.getElementById('togglePassword');
    const loginMessageBox = document.getElementById('loginMessageBox');
    const loginMessageText = document.getElementById('loginMessageText');

    // --- Helper Function to Display Messages ---
    function showLoginMessage(message, type) {
        loginMessageText.textContent = message;
        loginMessageBox.className = 'message-box ' + type;
        loginMessageBox.style.display = 'block';
        setTimeout(() => {
            loginMessageBox.style.display = 'none';
        }, 3000); // Hide message after 3 seconds
    }

    // --- Login Form Submission Handler ---
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevent default form submission

        // Basic client-side validation
        let isValid = true;
        if (usernameInput.value.trim() === '') {
            usernameInput.parentElement.classList.add('error');
            isValid = false;
        } else {
            usernameInput.parentElement.classList.remove('error');
            usernameInput.parentElement.classList.add('success');
        }

        if (passwordInput.value.trim() === '') {
            passwordInput.parentElement.classList.add('error');
            isValid = false;
        } else {
            passwordInput.parentElement.classList.remove('error');
            passwordInput.parentElement.classList.add('success');
        }

        if (!isValid) {
            showLoginMessage("Please fill in all required fields.", "error");
            return;
        }

        // Disable button and show loading state
        loginBtn.disabled = true;
        loginBtn.textContent = 'AUTHENTICATING...';
        loginBtn.style.background = 'linear-gradient(45deg, #00ffff, #00ff88)'; // Change color to indicate processing

        const identifier = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        try {
            const response = await fetch(`${API_URL}?action=login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ identifier, password })
            });

            const result = await response.json();

            if (result.success) {
                showLoginMessage(result.message || "Login successful!", "success");
                loginBtn.textContent = 'ACCESS GRANTED';
                loginBtn.style.background = 'linear-gradient(45deg, #00ff00, #00ff88)'; // Green for success

                setTimeout(() => {
                    window.location.href = 'http://192.168.1.2/Sudo_society_beta/dashboard.php'; // Redirect to challenges page
                }, 1500); // Wait a bit before redirecting
            } else {
                showLoginMessage(result.message || "Invalid username/email or password.", "error");
                loginBtn.textContent = 'ACCESS NOT GRANTED';
                loginBtn.style.background = 'linear-gradient(#ff0011, #ff0011, #ff0011)'; // Red for failure

                setTimeout(() => {
                    loginBtn.textContent = 'LOGIN';
                    loginBtn.style.background = 'linear-gradient(45deg, #00ff88, #00ffff)'; // Reset button style
                    loginBtn.disabled = false;
                }, 1500); // Reset button after a delay
            }
        } catch (error) {
            console.error('Login API call failed:', error);
            showLoginMessage("An error occurred during login. Please try again.", "error");
            loginBtn.textContent = 'LOGIN';
            loginBtn.style.background = 'linear-gradient(45deg, #00ff88, #00ffff)'; // Reset button style
            loginBtn.disabled = false;
        }
    });

    // --- Other UI Interactions ---

    // Toggle password visibility
    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.textContent = type === 'password' ? '👁️' : '🔒';
    });

    // Field validation on blur
    usernameInput.addEventListener('blur', function () {
      this.parentElement.classList.toggle('error', this.value.trim() === '');
      this.parentElement.classList.toggle('success', this.value.trim() !== '');
    });

    passwordInput.addEventListener('blur', function () {
      this.parentElement.classList.toggle('error', this.value.trim() === '');
      this.parentElement.classList.toggle('success', this.value.trim() !== '');
    });

    // Button hover effect (re-added for clarity, though CSS handles most)
    loginBtn.addEventListener('mouseenter', () => {
      if (!loginBtn.disabled) {
        loginBtn.style.boxShadow = '0 0 30px rgba(0, 255, 136, 0.8)';
      }
    });

    loginBtn.addEventListener('mouseleave', () => {
      if (!loginBtn.disabled) {
        loginBtn.style.boxShadow = '0 0 20px rgba(0, 255, 136, 0.5)';
      }
    });

    // Social button simulation (remains client-side for now)
    document.querySelectorAll('.social-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        this.textContent = '...';
        setTimeout(() => {
          this.textContent = this.getAttribute('title')[0];
          window.location.href = 'http://192.168.1.2/Sudo_society_beta/dashboard.php'; // Or relevant social login redirect
        }, 1000);
      });
    });

    // --- Initial Check on Page Load ---
    // This will check if the user is already logged in when they visit login.html
    document.addEventListener('DOMContentLoaded', async () => {
        console.log("Login page loaded. Checking login status...");
        try {
            const response = await fetch(`${API_URL}?action=checkLoginStatus`);
            const result = await response.json();

            if (result.success && result.loggedIn) {
                console.log("User is already logged in:", result.user.username);
                showLoginMessage(`Welcome back, ${result.user.username}! Redirecting...`, "success");
                loginBtn.disabled = true;
                loginBtn.textContent = 'ALREADY LOGGED IN';
                loginBtn.style.background = 'linear-gradient(45deg, #00ff00, #00ff88)';
                setTimeout(() => {
                    window.location.href = 'http://192.168.1.2/Sudo_society_beta/dashboard.php'; // Redirect to challenges page
                }, 1500);
            } else {
                console.log("User is not logged in.");
                // Ensure button is enabled and styled correctly if not logged in
                loginBtn.disabled = false;
                loginBtn.textContent = 'LOGIN';
                loginBtn.style.background = 'linear-gradient(45deg, #00ff88, #00ffff)';
            }
        } catch (error) {
            console.error("Error checking login status:", error);
            showLoginMessage("Could not verify login status. Please try again.", "error");
            loginBtn.disabled = false;
            loginBtn.textContent = 'LOGIN';
            loginBtn.style.background = 'linear-gradient(45deg, #00ff88, #00ffff)';
        }
    });
  </script>
